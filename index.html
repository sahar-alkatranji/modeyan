<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MODEYA - Fashion Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dubai-font@1.0.1/dubai-font/css/dubai-font.css">
    <!-- Stripe.js removed (P0-2): payments use the manual receipt + admin-approval flow; no live card gateway. -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              'sans': ['Montserrat', 'Dubai', 'sans-serif'],
              'serif': ['Playfair Display', 'Dubai', 'serif'],
            },
            colors: {
              'brand-beige': '#FBF6E6',
              'brand-gold': '#A07830',
              'brand-dark': '#1A1A1A',
              'brand-muted': '#F4F1EA',
            },
            boxShadow: {
              'premium': '0 10px 40px -10px rgba(0, 0, 0, 0.05)',
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            }
          }
        }
      }
    </script>
    <style>
      /* Base font: Dubai for Arabic, Playfair Display for Latin headings */
      :root {
        --font-arabic: 'Dubai', sans-serif;
        --font-latin: 'Playfair Display', 'Montserrat', sans-serif;
        --color-gold: #A07830;
        --color-dark: #1A1A1A;
        --color-beige: #FBF6E6;
      }
      /* Arabic text uses Dubai */
      :lang(ar), [dir="rtl"], .font-arabic {
        font-family: 'Dubai', sans-serif !important;
      }
      /* Headings & serif elements use Playfair + Dubai */
      h1, h2, h3, .font-serif {
        font-family: 'Playfair Display', 'Dubai', serif;
      }
      /* Body text */
      body, .font-sans {
        font-family: 'Montserrat', 'Dubai', sans-serif;
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.6s ease-out forwards;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.18);
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 20px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
      html, body {
        overflow-x: hidden;
        max-width: 100vw;
        background-color: var(--color-beige);
      }
      * {
        box-sizing: border-box;
      }
      .overflow-x-scroll, .flex.overflow-x-auto {
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .overflow-x-scroll::-webkit-scrollbar, .flex.overflow-x-auto::-webkit-scrollbar {
        display: none;
      }
      /* Consistent section padding */
      section { padding-top: 4rem; padding-bottom: 4rem; }
      /* Brand color consistency */
      .text-brand-gold { color: var(--color-gold) !important; }
      .border-brand-gold { border-color: var(--color-gold) !important; }
      .bg-brand-gold { background-color: var(--color-gold) !important; }
    </style>
  </head>
  <body class="bg-brand-beige">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
